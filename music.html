<!DOCTYPE html>
<html>
<head>
    <title>音乐快取</title>
    <style>
        /* 新增顶栏样式 */
        .topbar {
            background-color: rgba(52, 152, 219, 0.2); /* 半透明淡蓝色，透明度为0.4 */
            color: white;
            padding: 10px 0;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 999; /* 确保顶栏在最前面 */
            border-radius: 10px; /* 添加圆角样式 */
            backdrop-filter: blur(5px); /* 添加毛玻璃效果，可以根据需要调整模糊程度 */
        }

        .topbar a {
            color: white;
            text-decoration: none;
        }

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-image: url('https://api.maho.cc/random-img/pc.php');
            background-size: cover;
            padding: 70px 20px 20px; /* 调整页面顶部留出顶栏高度 */
            margin: 0;
        }

        h1 {
            color: #333;
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        #title-image {
            max-width: 40px;
            margin-right: 10px;
        }

        ul {
            list-style-type: none;
            padding: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
        }

        li {
            background-color: rgba(255, 255, 255, 0.4);
            margin-bottom: 10px;
            padding: 10px;
            box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            width: 100%;
        }

        audio {
            width: 100%;
            margin-top: 10px;
        }

        #git-gif {
            max-width: 100%;
        }

        /* 媒体查询：当屏幕宽度大于768像素时，将li元素的宽度设置为45% */
        @media screen and (min-width: 769px) {
            li {
                width: 45%;
            }
        }
    </style>
</head>
<body>
    <!-- 顶栏 -->
    <div class="topbar">
        <a href="https://i.nsoer.top/">返回</a>
    </div>

    <h1>
        <img id="title-image" src="https://img1.imgtp.com/2023/08/30/29kvOlOo.svg" alt="标题图像"> 音乐列表 | 如需持久访问，请在域名后加上music
    </h1>

    <ul>
        <li>
            <span>dj京仔-0.131 Baby Alice-Pina Colada Boy （dj京仔 remix）</span>
            <audio controls>
                <source src="music/DJ/dj京仔-0.131 Baby Alice-Pina Colada Boy （dj京仔 remix）.mp3" type="audio/mpeg">
                您的浏览器不支持音频标签。
            </audio>
        </li>
        <li>
            <span>歌曲2</span>
            <audio controls>
                <source src="music/song2.mp3" type="audio/mpeg">
                您的浏览器不支持音频标签。
            </audio>
        </li>
        <!-- 添加更多音乐文件 -->
    </ul>
</body>
</html>
